<!DOCTYPE html>
<html>
<head>

<title>Secure Chat</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

</head>

<body>

<div class="main">

<!-- SIDEBAR -->

<div class="sidebar">

{% for u in users %}
{% if u[0] != user %}

<div class="user"
onclick="selectUser('{{u[0]}}')">

<div class="user-left">

<div class="avatar">

{% if u[1] %}
<img src="/static/profile_pics/{{u[1]}}">
{% else %}
{{u[0][0].upper()}}
{% endif %}

</div>

<div>

<div>{{u[0]}}</div>

<div
style="font-size:11px;color:gray;"
id="status-{{u[0]}}">
offline
</div>

</div>

</div>

</div>

{% endif %}
{% endfor %}

</div>

<!-- CHAT AREA -->

<div class="chat-area">

<!-- HEADER -->

<div class="chat-header">

<div class="header-left">

<div class="avatar">

{% if mypic %}
<img src="/static/profile_pics/{{mypic}}">
{% else %}
{{user[0].upper()}}
{% endif %}

</div>

<div>

<div class="header-user"
id="chat-user">
Select User
</div>

<div class="header-status"
id="chat-status">
</div>

</div>

</div>

<div
style="display:flex;align-items:center;gap:10px;">

<button onclick="startVideoCall()">
📹
</button>

<a href="/logout"
style="color:white;text-decoration:none;">
Logout
</a>

</div>

</div>

<!-- CHAT -->

<div id="chat-box"
class="chat-box">
</div>

<!-- BOTTOM -->

<div class="bottom-area">

<!-- REPLY -->

<div class="reply-preview"
id="reply-preview">

Replying to:
<span id="reply-text"></span>

<button
onclick="cancelReply()"
style="
width:28px;
height:28px;
font-size:12px;
">
X
</button>

</div>

<!-- EMOJI -->

<div class="emoji-bar">

<button onclick="addEmoji('😀')">😀</button>
<button onclick="addEmoji('😂')">😂</button>
<button onclick="addEmoji('❤️')">❤️</button>
<button onclick="addEmoji('👍')">👍</button>

</div>

<!-- INPUT -->

<div class="input">

<input
type="text"
id="msg"
class="message-input"
placeholder="Type message">

<input
type="file"
id="file"
class="file-input">

<button onclick="startRecording()">
🎤
</button>

<button onclick="send()">
➤
</button>

</div>

</div>

</div>

</div>

<!-- MENU -->

<div id="menu" class="menu">

<div onclick="replyMsg()">Reply</div>

<div onclick="editMsg()">Edit</div>

<div onclick="deleteMsg()">Delete</div>

</div>

<!-- VIDEO -->

<div id="videoModal">

<h2 style="color:white;margin-bottom:15px;">
Video Call
</h2>

<video
id="localVideo"
autoplay
muted
playsinline>
</video>

<div class="video-controls">

<button
onclick="endVideoCall()"
style="background:red;">
❌
</button>

</div>

</div>

<script>

var socket = io();

var currentUser = "{{user}}";

var selectedUser = "";

var chatKey = "";

var currentMsgId = null;

var currentMsgText = "";

var replyText = "";

var mediaRecorder;

var audioChunks = [];

var localStream;

/* ENTER SEND */

document.getElementById("msg")
.addEventListener("keydown",function(e){

if(e.key==="Enter"){

e.preventDefault();

send();

}

});

/* EMOJI */

function addEmoji(e){

let input=document.getElementById("msg");

input.value += e;

input.focus();

}

/* SELECT USER */

function selectUser(user){

selectedUser=user;

document.getElementById("chat-user")
.innerText=user;

fetch('/get_key/'+user)

.then(r=>r.json())

.then(d=>{

chatKey=d.key;

loadMessages();

});

}

/* DECRYPT */

function decrypt(msg){

try{

return CryptoJS.AES.decrypt(msg,chatKey)
.toString(CryptoJS.enc.Utf8) || msg;

}catch{

return msg;

}

}

/* LOAD MESSAGES */

function loadMessages(){

if(!selectedUser) return;

fetch('/get_messages/'+selectedUser)

.then(r=>r.json())

.then(data=>{

let box=document.getElementById("chat-box");

box.innerHTML="";

data.messages.forEach(m=>{

let id=m[0];

let sender=m[1];

let msg=m[2];

let status=m[3];

let time=m[4];

let type=m[5];

let reply=m[6];

let div=document.createElement("div");

if(sender===currentUser){

div.classList.add("message","right");

}else{

div.classList.add("message","left");

}

let html="";

if(reply){

html += `
<div class="reply-box">
${reply}
</div>
`;

}

if(type==="image"){

html += `
<img class="chat-img"
src="/static/chat_images/${msg}">
`;

}
else if(type==="voice"){

html += `
<audio controls>
<source src="/static/voice_notes/${msg}">
</audio>
`;

}
else{

html += decrypt(msg);

}

let tick=(status==="seen")
? "✔✔"
: "✔";

html += `
<div class="time">
${time}
${sender===currentUser ? tick : ""}
</div>
`;

div.innerHTML=html;

/* RIGHT CLICK */

div.oncontextmenu=(e)=>{

if(sender===currentUser){

e.preventDefault();

showMenu(e,id,decrypt(msg));

}

};

box.appendChild(div);

});

box.scrollTop=box.scrollHeight;

});

}

/* MENU */

function showMenu(e,id,text){

let menu=document.getElementById("menu");

menu.style.display="block";

menu.style.left=e.pageX+"px";

menu.style.top=e.pageY+"px";

currentMsgId=id;

currentMsgText=text;

}

window.addEventListener("click",()=>{

document.getElementById("menu")
.style.display="none";

});

/* REPLY */

function replyMsg(){

replyText=currentMsgText;

document.getElementById("reply-preview")
.style.display="flex";

document.getElementById("reply-preview")
.style.justifyContent="space-between";

document.getElementById("reply-preview")
.style.alignItems="center";

document.getElementById("reply-text")
.innerText=currentMsgText;

}

function cancelReply(){

replyText="";

document.getElementById("reply-preview")
.style.display="none";

}

/* EDIT */

function editMsg(){

let nt=prompt(
"Edit message:",
currentMsgText
);

if(nt){

fetch('/edit_message/'+currentMsgId,{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
message:nt
})

}).then(loadMessages);

}

}

/* DELETE */

function deleteMsg(){

if(confirm("Delete message?")){

fetch('/delete_message/'+currentMsgId,{
method:'POST'
})

.then(loadMessages);

}

}

/* SEND */

function send(){

if(!selectedUser){

alert("Select user first");

return;

}

let msg=document.getElementById("msg").value;

let file=document.getElementById("file").files[0];

if(file){

let f=new FormData();

f.append("file",file);

fetch('/upload_image',{

method:'POST',

body:f

})

.then(r=>r.json())

.then(d=>{

socket.emit("private_message",{

msg:d.filename,

to:selectedUser,

type:"image",

reply:replyText

});

loadMessages();

});

document.getElementById("file").value="";

}
else if(msg){

let enc=CryptoJS.AES.encrypt(msg,chatKey)
.toString();

socket.emit("private_message",{

msg:enc,

to:selectedUser,

type:"text",

reply:replyText

});

loadMessages();

document.getElementById("msg").value="";

}

cancelReply();

}

/* VOICE */

async function startRecording(){

if(!selectedUser){

alert("Select user first");

return;

}

let stream = await navigator.mediaDevices
.getUserMedia({audio:true});

mediaRecorder = new MediaRecorder(stream);

mediaRecorder.start();

audioChunks=[];

mediaRecorder.ondataavailable = e=>{

audioChunks.push(e.data);

};

mediaRecorder.onstop = async ()=>{

let blob = new Blob(audioChunks,{
type:'audio/webm'
});

let fd = new FormData();

fd.append("audio",blob);

let r = await fetch('/upload_voice',{

method:'POST',

body:fd

});

let d = await r.json();

socket.emit("private_message",{

msg:d.filename,

to:selectedUser,

type:"voice",

reply:replyText

});

loadMessages();

};

setTimeout(()=>{

mediaRecorder.stop();

},5000);

}

/* VIDEO */

async function startVideoCall(){

try{

localStream =
await navigator.mediaDevices.getUserMedia({

video:true,
audio:true

});

document.getElementById("videoModal")
.style.display="flex";

document.getElementById("localVideo")
.srcObject = localStream;

}catch(err){

alert(
"Camera or microphone denied"
);

}

}

function endVideoCall(){

if(localStream){

localStream.getTracks().forEach(track=>{

track.stop();

});

}

document.getElementById("videoModal")
.style.display="none";

}

/* SOCKET */

socket.on("message",loadMessages);

socket.on("status",data=>{

let online=data.online;

let last=data.last_seen;

document.querySelectorAll("[id^=status-]")

.forEach(el=>{

let user=el.id.replace("status-","");

if(online.includes(user)){

el.innerText="🟢 online";

}
else if(last[user]){

el.innerText=
"last seen "+last[user];

}

});

if(selectedUser){

let el=document.getElementById("chat-status");

if(online.includes(selectedUser)){

el.innerText="🟢 online";

}
else if(last[selectedUser]){

el.innerText=
"last seen "+last[selectedUser];

}

}

});

socket.emit("join",{
username:currentUser
});

</script>

</body>
</html>

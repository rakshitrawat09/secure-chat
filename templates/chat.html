


<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Secure Chat</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#ece5dd;
overflow:hidden;
}

.main{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:30%;
background:white;
overflow-y:auto;
border-right:1px solid #ccc;
}

.user{
display:flex;
align-items:center;
padding:12px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.user:hover{
background:#f2f2f2;
}

.sidebar-pic{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
margin-right:10px;
}

.default-pic{
width:50px;
height:50px;
border-radius:50%;
background:#25d366;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
margin-right:10px;
}

.username{
font-weight:bold;
}

.chat-area{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

.chat-header{
background:#075e54;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header-left{
display:flex;
align-items:center;
}

.chat-profile{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
margin-right:10px;
background:white;
}

.header-right{
display:flex;
gap:15px;
align-items:center;
}

.header-right a{
color:white;
text-decoration:none;
}

/* MESSAGES */

#messages{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.mymsg,
.othermsg{
max-width:75%;
padding:10px;
margin:6px;
border-radius:10px;
position:relative;
word-wrap:break-word;
}

.mymsg{
align-self:flex-end;
background:#dcf8c6;
}

.othermsg{
align-self:flex-start;
background:white;
}

.time{
font-size:11px;
margin-top:5px;
text-align:right;
color:gray;
}

/* REPLY */

.reply-preview{
background:#d9d9d9;
padding:5px;
border-left:4px solid #075e54;
margin-bottom:5px;
font-size:13px;
border-radius:5px;
}

#replyBox{
display:none;
background:white;
padding:10px;
border-top:1px solid #ccc;
}

/* INPUT */

.input-area{
display:flex;
padding:10px;
background:white;
gap:8px;
align-items:center;
}

#msg{
flex:1;
padding:12px;
border-radius:20px;
border:1px solid #ccc;
outline:none;
font-size:16px;
}

.input-area button{
padding:10px 14px;
border:none;
border-radius:50%;
background:#25d366;
color:white;
cursor:pointer;
font-size:18px;
}

/* IMAGE */

.chat-image{
max-width:220px;
border-radius:10px;
cursor:pointer;
margin-top:5px;
}

/* MOBILE */

@media(max-width:768px){

.sidebar{
width:35%;
}

#msg{
font-size:16px;
}

.chat-image{
max-width:160px;
}

}

</style>

</head>

<body>

<div class="main">

<!-- SIDEBAR -->

<div class="sidebar">

{% for u in users %}

{% if u[0] != user %}

<div class="user"
onclick="openChat('{{u[0]}}','{{u[1]}}')">

{% if u[1] %}

<img
class="sidebar-pic"
src="/static/profile_pics/{{u[1]}}">

{% else %}

<div class="default-pic">
{{u[0][0].upper()}}
</div>

{% endif %}

<div>

<div class="username">
{{u[0]}}
</div>

<div id="status-{{u[0]}}">
offline
</div>

</div>

</div>

{% endif %}

{% endfor %}

</div>

<!-- CHAT AREA -->

<div class="chat-area">

<!-- HEADER -->

<div class="chat-header">

<div class="header-left">

<img
id="chatProfile"
class="chat-profile"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<div>

<div id="chatUser">
Select User
</div>

<div id="chatStatus">
</div>

</div>

</div>

<div class="header-right">

<span>📹</span>

<a href="/logout">
Logout
</a>

</div>

</div>

<!-- MESSAGES -->

<div id="messages">

</div>

<!-- REPLY -->

<div id="replyBox">

Replying to:
<span id="replyText"></span>

<button onclick="cancelReply()">
X
</button>

</div>

<!-- INPUT -->

<div class="input-area">

<input
type="text"
id="msg"
placeholder="Type message">

<input
type="file"
id="imageInput">

<button onclick="addEmoji('😀')">
😀
</button>

<button onclick="startRecording()">
🎤
</button>

<button onclick="sendMessage()">
➤
</button>

</div>

</div>

</div>

<script>

const socket = io();

let currentUser = "{{user}}";

let currentChat = "";

let currentReply = "";

socket.emit("join", {
username: currentUser
});


// OPEN CHAT

function openChat(user,pic){

currentChat = user;

document.getElementById(
"chatUser"
).innerHTML = user;


// FIX PROFILE PIC

if(pic && pic !== "None"){

document.getElementById(
"chatProfile"
).src =
"/static/profile_pics/" + pic;

}
else{

document.getElementById(
"chatProfile"
).src =
"https://cdn-icons-png.flaticon.com/512/149/149071.png";

}

loadMessages();

}


// LOAD MESSAGES

async function loadMessages(){

if(!currentChat) return;

let res = await fetch(
"/get_messages/" + currentChat
);

let data = await res.json();

let box =
document.getElementById("messages");

box.innerHTML = "";

data.messages.forEach(m => {

let div =
document.createElement("div");

if(m[1] == currentUser){

div.className = "mymsg";

}
else{

div.className = "othermsg";

}

let replyHTML = "";

if(m[6]){

replyHTML = `
<div class="reply-preview">
${m[6]}
</div>
`;

}


// IMAGE

if(m[5] == "image"){

div.innerHTML = `

${replyHTML}

<img
src="/static/chat_images/${m[2]}"
class="chat-image"
onclick="
window.open(
'/static/chat_images/${m[2]}'
)
">

<br>

<a
href="/static/chat_images/${m[2]}"
download>
Download
</a>

<div class="time">
${m[4]}
</div>
`;

}


// VOICE

else if(m[5] == "voice"){

div.innerHTML = `

${replyHTML}

<audio controls>
<source
src="/static/voice_notes/${m[2]}">
</audio>

<div class="time">
${m[4]}
</div>
`;

}


// TEXT

else{

div.innerHTML = `

${replyHTML}

<div class="msg-text">
${m[2]}
</div>

<div class="time">
${m[4]}
${m[3]=='seen'?'✓✓':'✓'}
</div>
`;

}


// CLICK TO REPLY

div.onclick = function(){

currentReply = m[2];

document.getElementById(
"replyBox"
).style.display = "block";

document.getElementById(
"replyText"
).innerHTML = currentReply;

};

box.appendChild(div);

});

box.scrollTop = box.scrollHeight;

}


// CANCEL REPLY

function cancelReply(){

currentReply = "";

document.getElementById(
"replyBox"
).style.display = "none";

}


// EMOJI

function addEmoji(e){

document.getElementById(
"msg"
).value += e;

}


// SEND MESSAGE

async function sendMessage(){

let msg =
document.getElementById(
"msg"
).value;

let file =
document.getElementById(
"imageInput"
).files[0];


// IMAGE SEND

if(file){

let fd = new FormData();

fd.append("file", file);

let res = await fetch(
"/upload_image",
{
method:"POST",
body:fd
}
);

let data = await res.json();

socket.emit(
"private_message",
{
to:currentChat,
msg:data.filename,
type:"image",
reply:currentReply
}
);

}


// TEXT SEND

else{

socket.emit(
"private_message",
{
to:currentChat,
msg:msg,
type:"text",
reply:currentReply
}
);

}


// CLEAR INPUT

document.getElementById(
"msg"
).value = "";

document.getElementById(
"imageInput"
).value = "";

cancelReply();

}


// LIVE UPDATE

socket.on("message", ()=>{

if(currentChat){

loadMessages();

}

});


// DUMMY RECORD FUNCTION

function startRecording(){

alert("Voice recording already connected.");

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(120deg,#00c6ff,#0072ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#0072ff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#005bd3;
}

.links{
    margin-top:15px;
}

.links a{
    text-decoration:none;
    color:#0072ff;
    font-size:14px;
    display:block;
    margin:5px 0;
}
</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<form action="/login" method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<div class="links">
<a href="/register">Create Account</a>
<a href="/forgot">Forgot Password?</a>
</div>

</div>

</body>
</html>
